name: Thank Contributor

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

permissions:
  contents: read
  issues: write
  pull-requests: read

concurrency:
  group: thank-contributor-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  thank:
    name: Post contributor thank-you
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Post thank-you comment
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');

            const marker = '<!-- prmaven-contributor-thanks -->';
            const contribution = context.payload.pull_request || context.payload.issue;
            const isPullRequest = Boolean(context.payload.pull_request);

            if (!contribution) {
              core.info('No issue or pull request payload found.');
              return;
            }

            const issue_number = contribution.number;
            const contributor = contribution.user.login;

            const existingComments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              per_page: 100,
            });

            if (existingComments.some((comment) => comment.body && comment.body.includes(marker))) {
              core.info(`Thank-you message already exists for #${issue_number}.`);
              return;
            }

            const template = fs.readFileSync('.github/contributor-thanks.md', 'utf8');
            const body = template
              .replaceAll('{{contributor}}', `@${contributor}`)
              .replaceAll('{{contribution_type}}', isPullRequest ? 'pull request' : 'issue');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              body: `${marker}\n${body}`,
            });
